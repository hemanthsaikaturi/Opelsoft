<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 216" fill="none" role="img" aria-label="OpelSoft">
  <defs>
    <clipPath id="sq">
      <rect x="8" y="8" width="200" height="200" rx="26" />
    </clipPath>
    <linearGradient id="bolt" x1="108" y1="56" x2="108" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7FBA00" />
      <stop offset="0.5" stop-color="#FFB900" />
      <stop offset="1" stop-color="#F25022" />
    </linearGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.18" />
    </filter>
  </defs>

  <!-- 4-colour chevron square -->
  <g clip-path="url(#sq)">
    <polygon points="8,8 208,8 108,108" fill="#7FBA00" />
    <polygon points="208,8 208,208 108,108" fill="#00A4EF" />
    <polygon points="208,208 8,208 108,108" fill="#FFB900" />
    <polygon points="8,208 8,8 108,108" fill="#F25022" />
  </g>

  <!-- white centre disc -->
  <circle cx="108" cy="108" r="66" fill="#ffffff" filter="url(#ds)" />

  <!-- lightning bolt -->
  <path d="M124 56 L82 114 L102 114 L92 160 L138 98 L114 98 Z" fill="url(#bolt)" />

  <!-- wordmark -->
  <text x="246" y="150" font-family="'Segoe UI', Inter, Arial, sans-serif" font-size="132" font-weight="500" fill="#7d7d7d" letter-spacing="-2">OpelSoft</text>
</svg>
